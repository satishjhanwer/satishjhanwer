name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.PROFILE_GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&count_private=true
          path: profile/top-langs.svg
          token: ${{ secrets.PROFILE_GITHUB_TOKEN }}

      - name: Generate streak stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PROFILE_GITHUB_TOKEN }}
          filename: profile/streak-stats.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 365
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push