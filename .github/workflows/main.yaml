name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.PROFILE_GITHUB_TOKEN }}
      - name: setup node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24.x'
      - name: cache
        uses: actions/cache@v4.2.0
        with:
          path: node_modules
          key: ${{ runner.os }}-js-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        run: yarn install
      - name: Generate README file
        run: node index.js
      - name: Commit and Push README.md
        uses: EndBug/add-and-commit@v10.0.0
        with:
          author_name: Satish Jhanwer
          author_email: satish.jhanwer@gmail.com
          default_author: user_info
          message: 'other: Updated README.md file using actions'
          add: '.'
