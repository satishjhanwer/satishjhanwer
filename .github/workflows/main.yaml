name: Update README

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PROFILE_GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24.x'

      - name: Enable corepack
        run: corepack enable

      - name: Set yarn version
        run: yarn set version stable

      - name: Cache
        uses: actions/cache@v4.2.0
        with:
          path: node_modules
          key: ${{ runner.os }}-js-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        run: yarn install

      - name: Generate README file
        run: node index.js

      - name: Commit and push
        uses: EndBug/add-and-commit@v10.0.0
        with:
          author_name: ${{ github.actor }}
          author_email: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
          default_author: user_info
          message: 'other: Updated README.md'
          add: '.'
